app = "read-player"
primary_region = "gru"

[build]

[env]
  PORT = "8080"
  DATABASE_URL = "sqlite:////data/readplayer.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "read_player_data"
  destination = "/data"
