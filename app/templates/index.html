{% extends "base.html" %}
{% block title %}Home — Read Player{% endblock %}

{% block content %}
<h1>Bem-vindo</h1>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-value">{{ total_texts }}</div>
    <div class="stat-label">Textos</div>
  </div>
  <div class="stat-card">
    <div class="stat-value">{{ total_words }}</div>
    <div class="stat-label">Palavras salvas</div>
  </div>
  <div class="stat-card">
    <div class="stat-value">{{ total_known }}</div>
    <div class="stat-label">Conhecidas</div>
  </div>
  <div class="stat-card">
    <div class="stat-value">{{ total_clicks }}</div>
    <div class="stat-label">Cliques</div>
  </div>
</div>

<a href="/library">
  <button>Ir para a biblioteca</button>
</a>
{% endblock %}
